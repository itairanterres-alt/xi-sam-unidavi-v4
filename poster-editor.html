<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XI SAM 2026 · Editor de layout do pôster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,600&display=swap" rel="stylesheet" />
  <style>
    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; }
    body{ font-family:'IBM Plex Sans', system-ui, -apple-system, sans-serif; color:#0C1A2B; background:#0A0E13; -webkit-font-smoothing:antialiased; }
    select:focus,input:focus{ outline:none; }
    #root{ min-height:100vh; }
  </style>

  <!-- React + Babel (versões fixadas) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <!-- QR real (gerador) -->
  <script src="https://unpkg.com/qrcode-generator@1.4.4/qrcode.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail" data-bg-color="#0A0E13">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#0A0E13"/>
      <rect x="300" y="220" width="600" height="300" rx="16" fill="#ffffff"/>
      <rect x="324" y="244" width="270" height="252" rx="6" fill="#E5F6FE" stroke="#00ADEF" stroke-width="3"/>
      <rect x="612" y="244" width="124" height="12" rx="6" fill="#023E88"/>
      <rect x="612" y="268" width="264" height="9" rx="4" fill="#cdd9e6"/>
      <rect x="612" y="286" width="264" height="9" rx="4" fill="#cdd9e6"/>
      <rect x="612" y="304" width="200" height="9" rx="4" fill="#cdd9e6"/>
      <rect x="430" y="560" width="340" height="48" rx="24" fill="#00ADEF"/>
      <text x="600" y="690" font-family="'IBM Plex Sans',sans-serif" font-size="44" font-weight="800" fill="#ffffff" text-anchor="middle">Editor de layout</text>
    </svg>
  </template>

  <!-- Dados (globais C, AREA_COR, TRABALHOS) — script clássico -->
  <script src="data.js"></script>
  <!-- Lib (ícones, QR, hooks) + renderizador V1 + editor — Babel -->
  <script type="text/babel" src="lib.jsx"></script>
  <script type="text/babel" src="posters.jsx"></script>
  <script type="text/babel" src="poster-editor.jsx"></script>
</body>
</html>
