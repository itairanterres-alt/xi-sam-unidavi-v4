<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XI SAM 2026 · Telão da Estação</title>
  <!-- Recursos referenciados em JS/JSX (o bundler não os descobre sozinho) -->
  <meta name="ext-resource-dependency" content="assets/logo-unidavi.png" data-resource-id="logoUnidavi" />
  <meta name="ext-resource-dependency" content="assets/hero-desktop.jpg" data-resource-id="heroDesktop" />
  <meta name="ext-resource-dependency" content="assets/hero-mobile.jpg" data-resource-id="heroMobile" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,600&display=swap" rel="stylesheet" />
  <style>
    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; }
    body{ font-family:'IBM Plex Sans', system-ui, -apple-system, sans-serif; color:#0C1A2B; background:#F7F9FB; -webkit-font-smoothing:antialiased; }
    input{ outline:none; font-family:inherit; }
    input:focus{ border-color:#00ADEF !important; }
    button{ font-family:inherit; }
    .card-link{ cursor:pointer; transition:border-color .15s ease, box-shadow .15s ease, transform .15s ease; }
    .card-link:hover{ border-color:#00ADEF !important; box-shadow:0 6px 18px rgba(2,62,136,0.13); transform:translateY(-1px); }
    .card-link:focus-visible{ outline:3px solid #00ADEF; outline-offset:2px; }
    .fade-troca{ animation:samFade .35s ease both; }
    @keyframes samFade{ from{ opacity:0; } to{ opacity:1; } }
    .skeleton{ background:linear-gradient(90deg,#EEF2F6 25%,#F8FAFC 50%,#EEF2F6 75%); background-size:200% 100%; animation:samShimmer 1.3s linear infinite; border-radius:8px; }
    @keyframes samShimmer{ from{ background-position:200% 0; } to{ background-position:-200% 0; } }
    .sam-spin{ animation:samSpin .9s linear infinite; }
    @keyframes samSpin{ to{ transform:rotate(360deg); } }
    #root{ min-height:100vh; }
    @media(max-width:430px){ .lbl-submeter{ display:none; } }
  </style>

  <!-- React + Babel (versões fixadas) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- QR real (gerador) -->
  <script src="https://unpkg.com/qrcode-generator@1.4.4/qrcode.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail" data-bg-color="#023E88">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#023E88"/>
      <rect x="470" y="250" width="260" height="300" rx="20" fill="#ffffff"/>
      <rect x="470" y="250" width="260" height="78" rx="20" fill="#00ADEF"/>
      <rect x="470" y="308" width="260" height="20" fill="#00ADEF"/>
      <rect x="500" y="360" width="200" height="16" rx="8" fill="#023E88"/>
      <rect x="500" y="392" width="200" height="16" rx="8" fill="#cdd9e6"/>
      <rect x="500" y="424" width="140" height="16" rx="8" fill="#cdd9e6"/>
      <rect x="520" y="468" width="60" height="60" rx="6" fill="#0C1A2B"/>
      <text x="600" y="640" font-family="'IBM Plex Sans',sans-serif" font-size="58" font-weight="800" fill="#ffffff" text-anchor="middle">SAM 2026</text>
      <text x="600" y="690" font-family="'IBM Plex Sans',sans-serif" font-size="26" font-weight="500" fill="#00ADEF" text-anchor="middle">Medicina UNIDAVI</text>
    </svg>
  </template>

  <!-- Dados (mock) — script clássico -->
  <script src="data.js"></script>

  <!-- Lib (ícones, QR, hooks), componentes e telas — Babel -->
  <script type="text/babel" src="lib.jsx"></script>
  <script type="text/babel" src="posters.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>

  <!-- App / Router -->
  <script>
    /* Entrada dedicada ao telão/kiosk: abre direto na estação 1 se nenhuma rota for informada. */
    if (!location.hash) { location.hash = "#/estacao/1"; }
  </script>
  <script type="text/babel" data-presets="react">
    function App() {
      const hash = useHashRoute();
      const route = useMemo(() => {
        const parts = hash.replace(/^#\//, "").split("/").filter(Boolean);
        if (parts[0] === "trabalho" && parts[1]) {
          const id = parts[1].split("?")[0];
          const tv = parts[2] === "tv" || /[?&]tv\b/.test(hash);
          return { tela:"trabalho", id, tv };
        }
        if (parts[0] === "estacao" && parts[1]) return { tela:"estacao", n:parts[1] };
        return { tela:"home" };
      }, [hash]);

      if (route.tela === "trabalho") return <PaginaTrabalho id={route.id} tv={route.tv} />;
      if (route.tela === "estacao")  return <Telao estacao={route.n} />;
      return <Home />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
